
<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>for of</title>
</head>

<body>
    <input placeholder="insira o nome" type="text" />
    <button onclick="buscar()">buscar</button>
    <p></p>
</body>
<script>
    let p = document.querySelector("p")
    let input = document.querySelector("input")

    const contacts = [
        { name: "ysabel", number: "(41)566928715" },
        { name: "maria", number: "(41)566987115" },
        { name: "adrian", number: "(41)566987515" },
        { name: "luis", number: "(41)5669871522" },
    ]
    function buscar() {
       for( const contact of contacts ){

            if (input.value.toLowerCase() === contact.name.tolowerCase()) {
                p.innerHTML = `contato encontrado nome: ${contact.name} telf: ${contact.number} `
               
               
               
                break
            } else {
                p.innerHTML = "contacto não encontrado, tente nuevamente"
            }


        }
    }
</script>




</html>
